<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

<button type="button" id="color">click here</button>

<p id="p1">This is a paragraph</p>

<script>

document.getElementById("color").addEventListener("click", displaycolor);

function displaycolor() {
    document.getElementById("p1").style.backgroundColor = "yellow";
}

</script>

</body>
</html>
