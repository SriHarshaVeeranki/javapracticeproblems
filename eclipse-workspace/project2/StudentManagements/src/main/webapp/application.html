<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Display</title>
    <!-- Add Bootstrap only if you want col-md-2 to work -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2">
            <img src="./html programs/image1.jpeg" alt="image1" width="100%" onmouseover="displayimg(this)" onmouseout="displayinfoimg()">
        </div>
         <div class="col-md-4">
            <img src="./html programs/image1.jpeg" alt="image1" width="100%" id="image">
        </div>
    </div>
</div>
<script>
function displayimg(i){
	document.getElementById("image").src=i.src;
}
</script>

</body>
</html>
