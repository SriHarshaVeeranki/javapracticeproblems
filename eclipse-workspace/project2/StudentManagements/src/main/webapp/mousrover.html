<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<p id="hover"style="width:200px; padding:10px; border:1px solid black;">move your mouse here</p>
<p id="msg"></p>
<script>
document.getElementById("hover").addEventListener("mouseover",display);
document.getElementById("hover").addEventListener("mouseout",displayout);


function display(){
document.getElementById("msg").innerHTML="mouse is over me";
}
function displayout(){
document.getElementById("msg").innerHTML="mouse is over out";
}
</script>

</body>
</html>
