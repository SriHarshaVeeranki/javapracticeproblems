<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<button type="button" id="btn">click me</button>
<p id="btnclick">0</p>
<script>
let count=0;

document.getElementById("btn").addEventListener("click",display);
function display(){


count=count+1;
document.getElementById("btnclick").innerHTML=count;
}
</script>

</body>
</html>
